<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sage – Daily Check-in</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --coral:   #e8715a;
      --amber:   #c96a2e;
      --sand:    #f5ede3;
      --clay:    #2b1f1a;
      --muted:   #7a6560;
      --card:    #fff8f2;
      --border:  #e8d8cc;
      --glow:    rgba(232,113,90,0.18);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--sand);
      color: var(--clay);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(232,113,90,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(201,106,46,0.10) 0%, transparent 60%);
    }

    /* ── LOGO ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2.2rem;
      animation: fadeDown 0.7s ease both;
    }

    .logo-ring {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--coral) 0%, var(--amber) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px var(--glow), 0 2px 8px rgba(0,0,0,0.08);
      position: relative;
    }

    /* animated halo */
    .logo-ring::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 2px solid rgba(232,113,90,0.35);
      animation: pulse 3s ease-in-out infinite;
    }

    .logo-s {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 600;
      color: #fff;
      line-height: 1;
      letter-spacing: -1px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--clay);
    }

    .logo-tagline {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem 2rem 1.8rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07);
      animation: fadeUp 0.7s 0.15s ease both;
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--clay);
      margin-bottom: 0.3rem;
    }

    .card p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.4rem;
      line-height: 1.5;
    }

    /* time picker row */
    .time-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .time-label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    input[type="time"] {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.55rem 0.9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--clay);
      background: var(--sand);
      outline: none;
      transition: border 0.2s;
    }
    input[type="time"]:focus { border-color: var(--coral); }

    /* buttons */
    .btn-primary {
      width: 100%;
      padding: 0.75rem;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--coral), var(--amber));
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 16px var(--glow);
      transition: opacity 0.2s, transform 0.15s;
      margin-bottom: 0.75rem;
    }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      width: 100%;
      padding: 0.7rem;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--coral);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-secondary:hover { background: rgba(232,113,90,0.06); border-color: var(--coral); }

    /* status pill */
    .status {
      display: none;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      padding: 0.55rem 0.9rem;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 500;
    }
    .status.success { display: flex; background: #eef7ee; color: #2d7a2d; }
    .status.error   { display: flex; background: #fdecea; color: #b53b2f; }
    .status.info    { display: flex; background: #fff3e0; color: #a05f00; }

    .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: currentColor;
    }

    /* divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.4rem 0 1.2rem;
    }

    /* open claude button */
    .btn-claude {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      width: 100%;
      padding: 0.72rem;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--sand);
      color: var(--clay);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-claude:hover { background: #ede3d8; border-color: #c8b4a4; }

    /* next alarm badge */
    .next-alarm {
      margin-top: 1.1rem;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
    }
    .next-alarm span { color: var(--coral); font-weight: 500; }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50%       { transform: scale(1.12); opacity: 0.15; }
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <div class="logo-ring"><span class="logo-s">S</span></div>
    <div class="logo-name">Sage</div>
    <div class="logo-tagline">Your daily planning companion</div>
  </div>

  <div class="card">
    <h2>Morning Check-in</h2>
    <p>Set a daily alarm time. You'll get a vibration & sound alert each morning to start your planning chat with Sage.</p>

    <div class="time-row">
      <span class="time-label">Alarm time</span>
      <input type="time" id="alarmTime" value="07:30" />
    </div>

    <button class="btn-primary" onclick="scheduleAlarm()">Enable daily alarm</button>
    <button class="btn-secondary" onclick="testAlarm()">Send a test alarm now</button>

    <div class="status" id="status">
      <div class="dot"></div>
      <span id="statusText"></span>
    </div>

    <hr class="divider" />

    <a class="btn-claude" href="https://claude.ai" target="_blank">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Open Sage (Claude) now
    </a>

    <div class="next-alarm" id="nextAlarm"></div>
  </div>

  <script>
    let alarmCheckInterval = null;
    let alarmFiredToday = false;

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      document.getElementById('statusText').textContent = msg;
    }

    function triggerAlarm() {
      // Vibrate the phone
      if (navigator.vibrate) {
        navigator.vibrate([500, 200, 500, 200, 500]);
      }

      // Play sound alert
      playAlertSound();

      // Show visual alert
      showAlertModal();

      // Prevent multiple fires in same day
      alarmFiredToday = true;
    }

    function playAlertSound() {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);

      oscillator.frequency.value = 800;
      oscillator.type = 'sine';

      gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.5);
    }

    function showAlertModal() {
      const modal = document.createElement('div');
      modal.style.cssText = `
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      `;

      const content = document.createElement('div');
      content.style.cssText = `
        background: white;
        padding: 2rem;
        border-radius: 20px;
        text-align: center;
        max-width: 300px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      `;

      content.innerHTML = `
        <h2 style="color: #2b1f1a; margin: 0 0 1rem; font-size: 1.5rem; font-family: 'Playfair Display', serif;">Good morning! ☀️</h2>
        <p style="color: #7a6560; margin: 0 0 1.5rem; font-size: 1rem;">Daily planning check-in with Sage</p>
        <button onclick="this.parentElement.parentElement.remove(); window.location.href='https://claude.ai'" style="width: 100%; padding: 0.75rem; background: linear-gradient(135deg, #e8715a, #c96a2e); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 500; cursor: pointer; margin-bottom: 0.5rem;">
          Open Sage (Claude)
        </button>
        <button onclick="this.parentElement.parentElement.remove()" style="width: 100%; padding: 0.75rem; background: #f5ede3; color: #2b1f1a; border: none; border-radius: 12px; font-size: 0.9rem; cursor: pointer;">
          Dismiss
        </button>
      `;

      modal.appendChild(content);
      document.body.appendChild(modal);
    }

    function scheduleAlarm() {
      const val = document.getElementById('alarmTime').value;
      const [hh, mm] = val.split(':').map(Number);

      // Clear any previous interval
      if (alarmCheckInterval) clearInterval(alarmCheckInterval);
      alarmFiredToday = false;

      // Check time every 10 seconds
      alarmCheckInterval = setInterval(() => {
        const now = new Date();
        const currentHours = now.getHours();
        const currentMinutes = now.getMinutes();

        // Trigger alarm when time matches (and hasn't fired today)
        if (currentHours === hh && currentMinutes === mm && !alarmFiredToday) {
          triggerAlarm();
        }

        // Reset daily at midnight
        if (currentHours === 0 && currentMinutes === 0) {
          alarmFiredToday = false;
        }
      }, 10000); // Check every 10 seconds

      // Format time nicely
      const display = new Date();
      display.setHours(hh, mm, 0, 0);
      const formatted = display.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      showStatus(`Alarm set for ${formatted} every day!`, 'success');

      // show next alarm time
      const next = new Date();
      next.setHours(hh, mm, 0, 0);
      if (next < new Date()) next.setDate(next.getDate() + 1);
      document.getElementById('nextAlarm').innerHTML =
        `Next alarm: <span>${next.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'})} at ${formatted}</span>`;
    }

    function testAlarm() {
      showStatus('Test alarm triggered!', 'info');
      triggerAlarm();
    }
  </script>
</body>
</html>
